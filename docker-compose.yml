services:
  mysql:
    image: mariadb:latest
    container_name: featherpanel_mysql
    restart: unless-stopped
    network_mode: host
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-featherpanel_root}
      MARIADB_DATABASE: ${MARIADB_DATABASE:-featherpanel}
      MARIADB_USER: ${MARIADB_USER:-featherpanel}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD:-featherpanel_password}
      MARIADB_AUTO_UPGRADE: "1"
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d
    healthcheck:
      test:
        [
          "CMD",
          "mariadb-admin",
          "ping",
          "-h",
          "localhost",
          "-u",
          "root",
          "-p${MARIADB_ROOT_PASSWORD:-featherpanel_root}",
        ]
      timeout: 20s
      retries: 10

  redis:
    image: redis:latest
    container_name: featherpanel_redis
    restart: unless-stopped
    network_mode: host
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-featherpanel_redis}
    volumes:
      - redis_data:/data
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "redis-cli",
          "-a",
          "${REDIS_PASSWORD:-featherpanel_redis}",
          "ping",
        ]
      timeout: 20s
      retries: 10

  backend:
    image: ghcr.io/mythicalltd/featherpanel-backend:latest
    container_name: featherpanel_backend
    restart: unless-stopped
    network_mode: host
    environment:
      - DATABASE_HOST=127.0.0.1
      - DATABASE_PORT=3306
      - DATABASE_DATABASE=${MARIADB_DATABASE:-featherpanel}
      - DATABASE_USER=${MARIADB_USER:-featherpanel}
      - DATABASE_PASSWORD=${MARIADB_PASSWORD:-featherpanel_password}
      - DATABASE_ENCRYPTION=xchacha20
      - REDIS_HOST=127.0.0.1
      - REDIS_PASSWORD=${REDIS_PASSWORD:-featherpanel_redis}
      - TRUST_PROXY_HEADERS=true
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "php", "cli", "help"]
      timeout: 20s
      retries: 10
    volumes:
      - featherpanel_attachments:/var/www/html/public/attachments
      - featherpanel_config:/var/www/html/storage/config
      - featherpanel_snapshots:/var/www/html/storage/backups

  frontendv2:
    image: ghcr.io/mythicalltd/featherpanel-frontendv2:latest
    container_name: featherpanel_frontendv2
    restart: unless-stopped
    network_mode: host
    environment:
      - INTERNAL_API_URL=http://127.0.0.1:80
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://localhost:80",
        ]
      timeout: 20s
      retries: 10

  async-runner:
    image: ghcr.io/mythicalltd/featherpanel-async-runner:latest
    container_name: featherpanel_async_runner
    restart: unless-stopped
    network_mode: host
    environment:
      - RUST_LOG=info
      - DB_HOST=127.0.0.1
      - DB_PORT=3306
      - DB_NAME=${MARIADB_DATABASE:-featherpanel}
      - DB_USER=${MARIADB_USER:-featherpanel}
      - DB_PASS=${MARIADB_PASSWORD:-featherpanel_password}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-featherpanel_redis}@127.0.0.1:6379
    volumes:
      - featherpanel_config:/app/config:ro
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      frontendv2:
        condition: service_healthy
      backend:
        condition: service_healthy

volumes:
  mariadb_data:
    driver: local
  redis_data:
    driver: local
  featherpanel_attachments:
    driver: local
  featherpanel_config:
    driver: local
  featherpanel_snapshots:
    driver: local
